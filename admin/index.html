<!doctype html>
<html lang="uk">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Milfey — Адмінка</title>

      <!-- Favicon -->
      <link rel="icon" type="image/png" href="../images/logo.png" />

      <!-- Open Graph -->
      <meta property="og:title" content="Milfey — Адмінка" />
      <meta property="og:description" content="Адміністративна панель Milfey" />
      <meta
         property="og:image"
         content="https://alexazaryan.github.io/milfey.kondyterka/images/logo.png"
      />
      <meta property="og:type" content="website" />
      <link
         href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Pacifico&display=swap"
         rel="stylesheet"
      />
      <link rel="stylesheet" href="admin.css" />
   </head>
   <body>
      <!-- ЛОГІН -->
      <div id="login-screen">
         <div class="login-box">
            <div class="login-logo">Milfey</div>
            <h2>Вхід в адмінку</h2>
            <input type="email" id="email" placeholder="Email" />
            <div class="password-wrap">
               <input type="password" id="password" placeholder="Пароль" />
               <span onclick="togglePassword()" class="eye-btn">👁</span>
            </div>
            <button onclick="login()">Увійти</button>
            <p id="login-error"></p>
         </div>
      </div>

      <!-- АДМІНКА -->
      <div id="admin-screen" style="display: none">
         <div class="admin-nav">
            <div class="admin-nav-container">
               <span class="admin-nav-logo">Milfey — Адмінка</span>
               <button class="logout-btn" onclick="logout()">Вийти</button>
            </div>
         </div>

         <div class="admin-wrap">
            <!-- ФОРМА ДОДАВАННЯ -->
            <div class="admin-form">
               <h3>Додати товар</h3>

               <div class="field-wrap">
                  <input
                     type="text"
                     id="p-name"
                     placeholder="Назва товару"
                     maxlength="35"
                  />
                  <small id="name-count">0/35</small>
               </div>

               <div class="field-wrap">
                  <textarea
                     id="p-desc"
                     placeholder="Опис товару"
                     maxlength="150"
                  ></textarea>
                  <small id="desc-count">0/150</small>
               </div>

               <input
                  type="number"
                  id="p-price"
                  placeholder="Ціна (грн)"
                  min="0"
               />

               <label class="file-label">
                  <span>📷 Обрати фото</span>
                  <input type="file" id="p-photo" accept="image/*" />
               </label>
               <img
                  id="photo-preview"
                  style="
                     display: none;
                     max-width: 160px;
                     border-radius: 12px;
                     margin-top: 8px;
                  "
               />

               <button onclick="addProduct()">Додати товар</button>
               <p id="form-status" class="form-status"></p>
            </div>

            <!-- СПИСОК ТОВАРІВ -->
            <div class="admin-list-section">
               <h3>Список товарів</h3>
               <div id="products-list"></div>
            </div>
         </div>
      </div>

      <script type="module" src="admin.js"></script>
   </body>
</html>
